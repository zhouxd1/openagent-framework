# Development Docker Compose Configuration
version: '3.8'

services:
  # OpenAgent Application (Development)
  openagent:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: openagent-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9229:9229"  # Node.js debugger
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3000
      - DATABASE_URL=postgresql://openagent:openagent@postgres:5432/openagent
      - REDIS_URL=redis://:openagent@redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - openagent-dev-network
    command: npm run dev

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: openagent-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openagent
      POSTGRES_USER: openagent
      POSTGRES_PASSWORD: openagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - openagent-dev-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: openagent-dev-redis
    restart: unless-stopped
    command: redis-server --requirepass openagent
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - openagent-dev-network

  # Adminer (Database GUI)
  adminer:
    image: adminer:latest
    container_name: openagent-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - openagent-dev-network

  # Redis Commander (Redis GUI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: openagent-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:openagent
    ports:
      - "8081:8081"
    networks:
      - openagent-dev-network

networks:
  openagent-dev-network:
    driver: bridge

volumes:
  postgres-dev-data:
  redis-dev-data:
