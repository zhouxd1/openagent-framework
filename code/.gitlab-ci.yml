# GitLab CI/CD Configuration

stages:
  - lint
  - test
  - build
  - security
  - deploy

variables:
  NODE_VERSION: "20"
  DOCKER_IMAGE: openagent/openagent
  DOCKER_TLS_CERTDIR: ""

# Cache configuration
.node_cache:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

# Linting
lint:
  stage: lint
  extends: .node_cache
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm run lint
    - npm run format:check
  only:
    - merge_requests
    - main
    - develop

# Testing
test:
  stage: test
  extends: .node_cache
  image: node:${NODE_VERSION}-alpine
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: openagent_test
    POSTGRES_USER: openagent
    POSTGRES_PASSWORD: "test-password"
    DATABASE_URL: "postgresql://openagent:test-password@postgres:5432/openagent_test"
    REDIS_URL: "redis://redis:6379"
  script:
    - npm ci
    - npx prisma generate
    - npm run test:coverage
  coverage: '/Lines\s*:\s*(\d+.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  only:
    - merge_requests
    - main
    - develop

# Build
build:
  stage: build
  extends: .node_cache
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
    - develop
    - tags

# Security scanning
security:
  stage: security
  extends: .node_cache
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm audit --audit-level=high
  allow_failure: true
  only:
    - main
    - develop

# Docker build
docker:build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        docker tag $DOCKER_IMAGE:$CI_COMMIT_SHA $DOCKER_IMAGE:latest
        docker push $DOCKER_IMAGE:latest
      fi
  only:
    - main
    - tags

# Deploy to staging
deploy:staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context staging-cluster
    - kubectl set image deployment/openagent openagent=$DOCKER_IMAGE:$CI_COMMIT_SHA -n openagent-staging
    - kubectl rollout status deployment/openagent -n openagent-staging --timeout=300s
  environment:
    name: staging
    url: https://staging.openagent.dev
  only:
    - develop
  when: manual

# Deploy to production
deploy:production:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context production-cluster
    - kubectl set image deployment/openagent openagent=$DOCKER_IMAGE:$CI_COMMIT_SHA -n openagent
    - kubectl rollout status deployment/openagent -n openagent --timeout=300s
  environment:
    name: production
    url: https://openagent.dev
  only:
    - main
  when: manual

# Deploy to AWS ECS
deploy:aws:
  stage: deploy
  image: amazon/aws-cli:latest
  script:
    - aws ecs update-service --cluster openagent-cluster --service openagent-service --force-new-deployment
  only:
    - main
  when: manual

# Notification
notify:success:
  stage: .post
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      curl -X POST $SLACK_WEBHOOK \
        -H 'Content-type: application/json' \
        -d '{
          "text": "✅ Deployment successful!",
          "attachments": [{
            "fields": [
              {"title": "Project", "value": "'$CI_PROJECT_NAME'", "short": true},
              {"title": "Branch", "value": "'$CI_COMMIT_REF_NAME'", "short": true},
              {"title": "Commit", "value": "'$CI_COMMIT_SHA'", "short": false}
            ]
          }]
        }'
  when: on_success
  only:
    - main

notify:failure:
  stage: .post
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      curl -X POST $SLACK_WEBHOOK \
        -H 'Content-type: application/json' \
        -d '{
          "text": "❌ Deployment failed!",
          "attachments": [{
            "fields": [
              {"title": "Project", "value": "'$CI_PROJECT_NAME'", "short": true},
              {"title": "Branch", "value": "'$CI_COMMIT_REF_NAME'", "short": true},
              {"title": "Commit", "value": "'$CI_COMMIT_SHA'", "short": false}
            ]
          }]
        }'
  when: on_failure
  only:
    - main
