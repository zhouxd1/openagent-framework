apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openagent
  namespace: openagent
  labels:
    app.kubernetes.io/name: openagent
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - openagent.example.com
    secretName: openagent-tls
  rules:
  - host: openagent.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openagent
            port:
              number: 80
