apiVersion: apps/v1
kind: Deployment
metadata:
  name: openagent
  namespace: openagent
  labels:
    app.kubernetes.io/name: openagent
    app.kubernetes.io/component: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: openagent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openagent
    spec:
      containers:
      - name: openagent
        image: openagent/openagent:latest
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: openagent-config
        - secretRef:
            name: openagent-secret
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
          requests:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
