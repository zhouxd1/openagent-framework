apiVersion: v1
kind: Secret
metadata:
  name: openagent-secret
  namespace: openagent
  labels:
    app.kubernetes.io/name: openagent
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # Change these values in production
  database-url: "postgresql://openagent:change-me@postgres:5432/openagent"
  redis-url: "redis://:change-me@redis:6379"
  # Add your API keys here
  openai-api-key: "your-openai-api-key"
  anthropic-api-key: "your-anthropic-api-key"
