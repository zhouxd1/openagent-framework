apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagent.fullname" . }}-secret
  labels:
    {{- include "openagent.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: "postgresql://openagent:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  redis-url: "redis://:{{ .Values.redis.auth.password }}@{{ .Release.Name }}-redis-master:6379"
