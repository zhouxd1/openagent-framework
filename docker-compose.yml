version: '3.8'

services:
  # OpenAgent 主服务
  openagent:
    build:
      context: ./code
      dockerfile: Dockerfile
    container_name: openagent
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://openagent:openagent@postgres:5432/openagent
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    depends_on:
      - postgres
      - redis
    volumes:
      - ./code:/app
      - /app/node_modules
    networks:
      - openagent-network

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: openagent-postgres
    environment:
      - POSTGRES_USER=openagent
      - POSTGRES_PASSWORD=openagent
      - POSTGRES_DB=openagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - openagent-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: openagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - openagent-network

  # Prometheus 监控（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: openagent-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - openagent-network
    profiles:
      - monitoring

  # Grafana 仪表板（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: openagent-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - openagent-network
    profiles:
      - monitoring

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  openagent-network:
    driver: bridge
